services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: stockmanager
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: stockmanager
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://stockmanager:${DB_PASSWORD}@db:5432/stockmanager
      NODE_ENV: production
      PORT: 3000
      UPLOADS_DIR: /data/uploads
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - uploads:/data/uploads

volumes:
  pgdata:
  uploads:
