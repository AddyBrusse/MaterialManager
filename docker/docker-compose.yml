services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: stockmanager
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: stockmanager
    # No published ports: the DB is only reachable on the compose network.
    # For ad-hoc access use: docker compose exec db psql -U stockmanager
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://stockmanager:${DB_PASSWORD}@db:5432/stockmanager
      NODE_ENV: production
      PORT: 3000
      UPLOADS_DIR: /data/uploads
    # Only the proxy reaches the app; not published to the LAN.
    expose:
      - "3000"
    volumes:
      - uploads:/data/uploads

  proxy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
      args:
        CADDY_DNS_MODULE: ${CADDY_DNS_MODULE:-github.com/caddy-dns/cloudflare}
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
      DNS_API_TOKEN: ${DNS_API_TOKEN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # Certificates + ACME account live in caddy_data — must persist
      # across recreates or Caddy re-requests certs (rate limits!).
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  uploads:
  caddy_data:
  caddy_config:
