services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: stockmanager
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: stockmanager
    # No published ports: the DB is only reachable on the compose network.
    # For ad-hoc access use: docker compose exec db psql -U stockmanager
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://stockmanager:${DB_PASSWORD}@db:5432/stockmanager
      NODE_ENV: production
      PORT: 3000
      UPLOADS_DIR: /data/uploads
    # Only the proxy reaches the app; not published to the LAN.
    expose:
      - "3000"
    volumes:
      - uploads:/data/uploads

  proxy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # Certificates from the manual renew-cert.sh flow — no ACME state of
      # Caddy's own to persist, since it never talks to Let's Encrypt itself.
      - ./certs:/certs:ro
      - caddy_config:/config

volumes:
  pgdata:
  uploads:
  caddy_config:
